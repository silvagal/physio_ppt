_base_:
  - ../data/mitbih_fs500.yaml
  - ../data/ptbxl_fs500.yaml
  - ../model/backbone_transformer.yaml
  - ../model/heads_ppt.yaml

experiment:
  name: ppt_classic
  method: ppt_classic

paths:
  output_root: physio_ppt/outputs
  figures_dir: physio_ppt/figures

pipeline:
  do_pretrain: true
  do_finetune: true
  label_fractions: [0.01, 0.05, 0.10]

train:
  batch_size: 64
  num_workers: 0
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  early_stop_patience: 6
  task_type: multilabel
  num_classes: 5
  use_focal: false
  freeze_backbone: false
  label_fraction: 1.0
  # crop_size = 500 amostras = 1000 ms @ 500 Hz: alinhado ao beat scale do pretrain
  # (MIT-BIH windows pre-treino: 2000 ms, mas o backbone recebe o crop de 1000 ms).
  crop_size: 500
  max_samples: null
  max_train_samples: null

ssl:
  patch_len_perm: 40
  channel_perm_prob: 0.3
  lambda_consistency: 1.0
  lambda_contrast: 1.0
  temperature: 0.2
