_base_:
  - ../data/ptbxl_fs500.yaml
  - ../model/backbone_resnet1d.yaml

experiment:
  name: supervised_strong
  method: supervised_strong

paths:
  output_root: physio_ppt/outputs
  figures_dir: physio_ppt/figures

pipeline:
  do_pretrain: false
  do_finetune: true
  label_fractions: [0.01, 0.05, 0.10]

train:
  batch_size: 32
  num_workers: 0
  epochs: 25
  lr: 0.001
  weight_decay: 0.0001
  early_stop_patience: 6
  task_type: multilabel
  num_classes: 5
  use_focal: false
  freeze_backbone: false
  label_fraction: 1.0
  # crop_size = 500 amostras = 1000 ms @ 500 Hz: alinhado ao beat scale para
  # comparacao justa com os metodos SSL que pretreinam em beats de ~834 ms.
  crop_size: 500
  max_train_samples: null
