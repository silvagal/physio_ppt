_base_:
  - ../data/mitbih_fs500.yaml
  - ../data/ptbxl_fs500.yaml
  - ../model/backbone_resnet1d.yaml
  - ../model/heads_physio_ppt.yaml

experiment:
  name: physio_ppt
  method: physio_ppt

paths:
  output_root: physio_ppt/outputs
  figures_dir: physio_ppt/figures

pipeline:
  do_pretrain: true
  do_finetune: true
  label_fractions: [0.01, 0.05, 0.10]

train:
  batch_size: 64
  num_workers: 0
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  early_stop_patience: 6
  task_type: multilabel
  num_classes: 5
  use_focal: false
  freeze_backbone: false
  label_fraction: 1.0
  # crop_size alinhado ao beat scale: MIT-BIH beats = 417 samples @ 500 Hz (834 ms).
  # Usamos 500 amostras (1000 ms) para cobrir o beat com margem e manter
  # simetria com o comprimento de pretrain. Ambos os datasets estao em 500 Hz
  # (MIT-BIH foi reamostrado de 360->500 Hz no pre-processamento).
  crop_size: 500
  max_samples: null
  max_train_samples: null

ssl:
  beat_pre_ms: 200
  perturb_mode: mixed
  lambda_consistency: 1.0
  lambda_contrast: 1.0
  lambda_segment: 0.2
  temperature: 0.2
  use_consistency: true
  use_contrastive: true
