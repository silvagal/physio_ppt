_base_:
  - ../dataset/ptbxl_superdiag_official_fs100.yaml
  - ../model/legacy_physioppt_transformer.yaml
  - ../train/record_level_default.yaml

experiment:
  name: physioppt_legacy_transformer_01pct
  kind: ssl_finetune

